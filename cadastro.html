<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastrar Colaboradora</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<script src="node_modules/face-api.js/dist/face-api.min.js"></script>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:'Roboto', sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#680307,#680307);
}

.card{
  background:#e8d9c3;
  width:420px;
  padding:35px;
  border-radius:12px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  max-height: 95vh;
  overflow-y: auto;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h2{
  margin:0;
  font-weight:500;
  color:#333;
}

.voltar{
  background:#9e9e9e;
  border:none;
  color:#e8d9c3;
  padding:6px 12px;
  margin-left: 20px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.voltar:hover{
  background:#757575;
}

.input-group{ margin-bottom:18px; }

input{
  width:100%;
  padding:10px;
  border:none;
  border-bottom:2px solid #ccc;
  font-size:14px;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-bottom:2px solid #680307;
}

.camera-container {
  text-align: center;
  margin-bottom: 18px;
}

#video {
  width: 100%;
  border-radius: 8px;
  background: #000;
  display: none;
}

#canvas {
  display: none;
}

#photo-preview {
  width: 100%;
  border-radius: 8px;
  margin-top: 10px;
  display: none;
}

.btn-camera {
  background: #680307;
  margin-bottom: 10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#680307;
  color:#e8d9c3;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#890408;
  transform:translateY(-2px);
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.mensagem{
  margin-top:15px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="card">

<div class="top-bar">
  <h2>Cadastro</h2>
  <button class="voltar" onclick="voltar()">Voltar</button>
</div>

<form id="formCadastro">

  <div class="input-group">
    <input type="text" id="nome" placeholder="Nome completo" required>
  </div>

  <div class="input-group">
    <input type="text" id="cpf" placeholder="CPF" required>
  </div>

  <div class="input-group">
    <input type="time" id="inicio" required>
  </div>

  <div class="input-group">
    <input type="time" id="saida" required>
  </div>

  <div class="input-group">
    <input type="text" id="descanso" placeholder="Descanso (ex: 12:00-13:00)" required>
  </div>

  <div class="camera-container">
    <label style="display:block; margin-bottom:10px; font-size:14px;">Foto para Reconhecimento Facial</label>
    <video id="video" autoplay muted></video>
    <canvas id="canvas"></canvas>
    <img id="photo-preview" src="" alt="Preview">
    <button type="button" id="btn-iniciar-camera" class="btn-camera">Iniciar Câmera</button>
    <button type="button" id="btn-capturar" class="btn-camera" style="display:none;">Capturar Foto</button>
  </div>

  <button type="submit" id="btn-salvar">Salvar Colaboradora</button>

</form>

<div class="mensagem" id="mensagem"></div>

</div>

<script>
let faceDescriptor = null;
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const photoPreview = document.getElementById('photo-preview');
const btnIniciar = document.getElementById('btn-iniciar-camera');
const btnCapturar = document.getElementById('btn-capturar');
const btnSalvar = document.getElementById('btn-salvar');

// Carregar modelos do face-api
async function loadModels() {
  await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
  await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
  await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
  console.log("Modelos carregados");
}

loadModels();

btnIniciar.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.style.display = 'block';
    photoPreview.style.display = 'none';
    btnIniciar.style.display = 'none';
    btnCapturar.style.display = 'block';
  } catch (err) {
    alert("Erro ao acessar a câmera: " + err);
  }
});

btnCapturar.addEventListener('click', async () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  
  const dataUrl = canvas.toDataURL('image/jpeg');
  photoPreview.src = dataUrl;
  photoPreview.style.display = 'block';
  video.style.display = 'none';
  btnCapturar.style.display = 'none';
  btnIniciar.textContent = "Tirar outra foto";
  btnIniciar.style.display = 'block';

  // Extrair descritor facial
  document.getElementById("mensagem").textContent = "Processando rosto...";
  const detection = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
  
  if (detection) {
    faceDescriptor = Array.from(detection.descriptor);
    document.getElementById("mensagem").style.color = "green";
    document.getElementById("mensagem").textContent = "Rosto detectado com sucesso!";
  } else {
    faceDescriptor = null;
    document.getElementById("mensagem").style.color = "red";
    document.getElementById("mensagem").textContent = "Nenhum rosto detectado. Tente novamente.";
  }
});

document.getElementById("formCadastro").addEventListener("submit", async function(e){
  e.preventDefault();

  if (!faceDescriptor) {
    alert("Por favor, capture uma foto com um rosto visível antes de salvar.");
    return;
  }

  const nova = {
    nome: document.getElementById("nome").value,
    cpf: document.getElementById("cpf").value,
    horario_inicio: document.getElementById("inicio").value,
    horario_saida: document.getElementById("saida").value,
    horario_descanso: document.getElementById("descanso").value,
    face_descriptor: faceDescriptor // Salvando o descritor facial
  };

  try {
    const response = await fetch("/cadastrar-colaboradora", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(nova)
    });

    const resultado = await response.json();

    if(response.ok){
      document.getElementById("mensagem").style.color = "green";
      document.getElementById("mensagem").textContent = resultado.mensagem;
      document.getElementById("formCadastro").reset();
      photoPreview.style.display = 'none';
      faceDescriptor = null;
    } else {
      document.getElementById("mensagem").style.color = "red";
      document.getElementById("mensagem").textContent = resultado.mensagem;
    }

  } catch(error){
    document.getElementById("mensagem").style.color = "red";
    document.getElementById("mensagem").textContent = "Erro ao conectar com servidor.";
  }

});

function voltar(){
  window.location.href = "admin.html";
}
</script>

</body>
</html>
