<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatorio de Ponto</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body{ margin:0; font-family:'Roboto', sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#680307,#680307); }
.card{ background:#e8d9c3; width:520px; padding:35px; border-radius:12px; box-shadow:0 15px 35px rgba(0,0,0,0.2); }
h2{ margin-top:0; text-align:center; font-weight:500; }
.input-group{ margin-bottom:20px; }
input{ width:100%; padding:10px; border:none; border-bottom:2px solid #ccc; outline:none; font-size:14px; }
input:focus{ border-bottom:2px solid #680307; }
button{ width:100%; padding:12px; border:none; border-radius:8px; background:#680307; color:#e8d9c3; font-weight:500; cursor:pointer; transition:0.3s; margin-bottom:10px; }
button:hover{ background:#890408; }
.mensagem{ margin-top:15px; font-size:13px; }
.voltar{ background:#9e9e9e; border:none; color:#e8d9c3; padding:6px 12px; margin-left:20px; border-radius:6px; cursor:pointer; font-size:12px; }
.voltar:hover{ background:#757575; }
.top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
</style>
</head>
<body>
<div class="card">
<div class="top-bar">
  <h2>Relatorio</h2>
  <button class="voltar" onclick="voltar()">Voltar</button>
</div>
<div class="input-group">
  <input type="text" id="cpfRelatorio" placeholder="Digite o CPF para relatorio individual">
</div>
<button onclick="gerarPDFIndividual()">Gerar Relatorio Individual</button>
<hr style="margin:20px 0">
<button onclick="gerarPDFGeral()">Gerar Relatorio Geral (Todos)</button>
<div class="mensagem" id="mensagem"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const mensagem = document.getElementById("mensagem");

function normalizeCpf(value) {
  return String(value || "").replace(/\D/g, "");
}

function setMensagem(texto, cor) {
  mensagem.textContent = texto;
  mensagem.style.color = cor;
}

function getDiasDoMesAtual() {
  const agora = new Date();
  return new Date(agora.getFullYear(), agora.getMonth() + 1, 0).getDate();
}

function getDataDoMesAtual(dia) {
  const agora = new Date();
  return `${agora.getFullYear()}-${String(agora.getMonth() + 1).padStart(2, "0")}-${String(dia).padStart(2, "0")}`;
}

function renderizarPagina(doc, colab) {
  const agora = new Date();
  const periodo = `${String(agora.getMonth() + 1).padStart(2, "0")}/${agora.getFullYear()}`;
  const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"];

  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.text("FOLHA INDIVIDUAL DE PONTO", 10, 10);
  doc.text(`Periodo: ${periodo}`, 160, 10);

  doc.autoTable({
    startY: 12,
    theme: "plain",
    styles: { fontSize: 8, cellPadding: 1, lineColor: [0, 0, 0], lineWidth: 0.1 },
    body: [
      [
        { content: "Empresa: 17 - LUZZA SERVICOS E COMERCIO LTDA\nCidade: PALMAS", styles: { halign: "left" } },
        { content: "CNPJ: 58.114.617/0001-18\nUF: TO", styles: { halign: "left" } },
      ],
      [
        { content: `Nome: ${colab.nome.toUpperCase()}\nCPF: ${colab.cpf}`, styles: { halign: "left" } },
        {
          content: `Horario: ${colab.horario_inicio || "08:00"} - ${colab.horario_descanso || "12:00-13:00"} - ${colab.horario_saida || "17:00"}\nDepartamento: GERAL`,
          styles: { halign: "left" },
        },
      ],
    ],
    columnStyles: { 0: { cellWidth: 100 }, 1: { cellWidth: 90 } },
  });

  const diasIndexados = new Map((colab.dias || []).map((dia) => [dia.data, dia]));
  const rows = [];

  for (let dia = 1; dia <= getDiasDoMesAtual(); dia += 1) {
    const dataStr = getDataDoMesAtual(dia);
    const dataObj = new Date(agora.getFullYear(), agora.getMonth(), dia);
    const diaSemana = diasSemana[dataObj.getDay()];
    const ponto = diasIndexados.get(dataStr) || {};

    rows.push([
      String(dia).padStart(2, "0"),
      diaSemana,
      ponto.entrada || "",
      ponto.saida_almoco || "",
      ponto.volta_almoco || "",
      ponto.saida || "",
      "",
    ]);
  }

  doc.autoTable({
    startY: doc.lastAutoTable.finalY + 2,
    head: [["Dia", "Sem", "Entrada", "Saida Almoco", "Volta Almoco", "Saida", "Assinatura"]],
    body: rows,
    theme: "grid",
    styles: { fontSize: 7, cellPadding: 1, halign: "center", lineColor: [0, 0, 0], lineWidth: 0.1 },
    headStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: "bold" },
    columnStyles: {
      0: { cellWidth: 12 },
      1: { cellWidth: 12 },
      6: { cellWidth: 45 },
    },
  });

  const finalY = doc.lastAutoTable.finalY + 5;
  doc.setFontSize(7);
  doc.text("Obs.: Relatorio gerado automaticamente pelo sistema.", 10, finalY);
  doc.text("Reconheco a exatidao destas anotacoes. Data: ________/________/________", 50, finalY + 5);

  doc.line(20, finalY + 20, 90, finalY + 20);
  doc.text("Visto chefia", 45, finalY + 24);

  doc.line(120, finalY + 20, 190, finalY + 20);
  doc.text("Visto colaboradora", 143, finalY + 24);
}

function gerarFolhaDePonto(colab) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");
  renderizarPagina(doc, colab);
  doc.save(`Folha_Ponto_${colab.nome.replace(/\s+/g, "_")}.pdf`);
  setMensagem("PDF gerado com sucesso!", "green");
}

async function gerarPDFIndividual() {
  const cpf = normalizeCpf(document.getElementById("cpfRelatorio").value);
  if (!cpf) {
    alert("Digite um CPF");
    return;
  }

  const response = await fetch(`/api/relatorio/${encodeURIComponent(cpf)}`);
  const dados = await response.json();

  if (!dados.dias || dados.dias.length === 0) {
    setMensagem("Nenhum registro encontrado.", "red");
    return;
  }

  gerarFolhaDePonto(dados);
}

async function gerarPDFGeral() {
  const response = await fetch("/api/relatorio-geral");
  const dados = await response.json();

  if (!dados.registros_ponto || dados.registros_ponto.length === 0) {
    setMensagem("Nenhum registro encontrado.", "red");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");

  dados.registros_ponto.forEach((colab, index) => {
    if (index > 0) {
      doc.addPage();
    }

    renderizarPagina(doc, colab);
  });

  doc.save("Folha_de_Ponto_Geral.pdf");
  setMensagem("PDF geral gerado com sucesso!", "green");
}

function voltar() {
  window.location.href = "admin.html";
}
</script>
</body>
</html>
