<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Roboto', sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#680307,#42a5f5);
}

.card{
  background:#e8d9c3;
  width:520px;
  padding:35px;
  border-radius:12px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h2{
  margin-top:0;
  text-align:center;
  font-weight:500;
}

.input-group{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-bottom:2px solid #ccc;
  outline:none;
  font-size:14px;
}

input:focus{
  border-bottom:2px solid #680307;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#680307;
  color:#e8d9c3;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
  margin-bottom:10px;
}

button:hover{
  background:#125ca1;
}

.mensagem{
  margin-top:15px;
  font-size:13px;
}


.voltar{
  background:#9e9e9e;
  border:none;
  color:#e8d9c3;
  padding:6px 12px;
  margin-left: 20px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.voltar:hover{
  background:#757575;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
</style>
</head>
<body>

<div class="card">

<div class="top-bar">
  <h2>Relatório</h2>
  <button class="voltar" onclick="voltar()">Voltar</button>
</div>

<div class="input-group">
  <input type="text" id="cpfRelatorio" placeholder="Digite o CPF para relatório individual">
</div>

<button onclick="gerarPDFIndividual()">Gerar Relatório Individual</button>

<hr style="margin:20px 0">

<button onclick="gerarPDFGeral()">Gerar Relatório Geral (Todos)</button>

<div class="mensagem" id="mensagem"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function calcularHoras(dia){

  if(!dia.entrada || !dia.saida) return 0;

  const [h1,m1] = dia.entrada.split(":").map(Number);
  const [h2,m2] = dia.saida.split(":").map(Number);

  let minutos = (h2*60+m2) - (h1*60+m1);

  if(dia.saida_almoco && dia.volta_almoco){
    const [ha1,ma1] = dia.saida_almoco.split(":").map(Number);
    const [ha2,ma2] = dia.volta_almoco.split(":").map(Number);
    minutos -= (ha2*60+ma2) - (ha1*60+ma1);
  }

  return minutos;
}

async function gerarPDFIndividual(){

  const cpf = cpfRelatorio.value;
  const response = await fetch(`/relatorio/${cpf}`);
  const dados = await response.json();

  if(!dados.dias || dados.dias.length === 0){
    mensagem.textContent = "Nenhum registro encontrado. Esse colaborador pode nao ter registrado nenhum ponto!";
    mensagem.style.color = "red";
    return;
  }

  gerarPDF([dados]);
}

async function gerarPDFGeral(){

  const response = await fetch(`/relatorio-geral`);
  const dados = await response.json();

  if(!dados.registros_ponto || dados.registros_ponto.length === 0){
    mensagem.textContent = "Nenhum registro encontrado.";
    mensagem.style.color = "red";
    return;
  }

  gerarPDF(dados.registros_ponto);
}

function gerarPDF(lista){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 15;

  doc.setFontSize(16);
  doc.text("RELATÓRIO DE PONTO", 70, y);
  y += 15;

  lista.forEach(colab => {

    doc.setFontSize(12);
    doc.text(`Nome: ${colab.nome || ""}`, 10, y);
    y += 6;
    doc.text(`CPF: ${colab.cpf || ""}`, 10, y);
    y += 10;

    doc.setFontSize(10);
    doc.text("Data        Entrada   S.Alm   V.Alm   Saída   Total", 10, y);
    y += 6;

    let totalMinutos = 0;

    colab.dias.forEach(dia => {

      const minutos = calcularHoras(dia);
      totalMinutos += minutos;

      const horas = minutos > 0 ? 
        Math.floor(minutos/60)+"h"+(minutos%60)+"m" : "";

      doc.text(
        `${dia.data || ""}   ${dia.entrada || ""}   ${dia.saida_almoco || ""}   ${dia.volta_almoco || ""}   ${dia.saida || ""}   ${horas}`,
        10,
        y
      );

      y += 6;

      if(y > 270){
        doc.addPage();
        y = 15;
      }

    });

    const totalH = Math.floor(totalMinutos/60);
    const totalM = totalMinutos%60;

    y += 5;
    doc.text(`TOTAL TRABALHADO: ${totalH}h ${totalM}m`, 10, y);
    y += 15;

  });

  doc.save("relatorio_ponto.pdf");

  mensagem.textContent = "PDF gerado com sucesso!";
  mensagem.style.color = "green";
}


function voltar(){
  window.location.href = "admin.html";
}

</script>

</body>
</html>
