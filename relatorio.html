<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório de Ponto</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body{ margin:0; font-family:'Roboto', sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#680307,#680307); }
.card{ background:#e8d9c3; width:520px; padding:35px; border-radius:12px; box-shadow:0 15px 35px rgba(0,0,0,0.2); }
h2{ margin-top:0; text-align:center; font-weight:500; }
.input-group{ margin-bottom:20px; }
input{ width:100%; padding:10px; border:none; border-bottom:2px solid #ccc; outline:none; font-size:14px; }
input:focus{ border-bottom:2px solid #680307; }
button{ width:100%; padding:12px; border:none; border-radius:8px; background:#680307; color:#e8d9c3; font-weight:500; cursor:pointer; transition:0.3s; margin-bottom:10px; }
button:hover{ background:#125ca1; }
.mensagem{ margin-top:15px; font-size:13px; }
.voltar{ background:#9e9e9e; border:none; color:#e8d9c3; padding:6px 12px; margin-left: 20px; border-radius:6px; cursor:pointer; font-size:12px; }
.voltar:hover{ background:#757575; }
.top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
</style>
</head>
<body>
<div class="card">
<div class="top-bar">
  <h2>Relatório</h2>
  <button class="voltar" onclick="voltar()">Voltar</button>
</div>
<div class="input-group">
  <input type="text" id="cpfRelatorio" placeholder="Digite o CPF para relatório individual">
</div>
<button onclick="gerarPDFIndividual()">Gerar Relatório Individual</button>
<hr style="margin:20px 0">
<button onclick="gerarPDFGeral()">Gerar Relatório Geral (Todos)</button>
<div class="mensagem" id="mensagem"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
async function gerarPDFIndividual(){
  const cpf = cpfRelatorio.value;
  if(!cpf) { alert("Digite um CPF"); return; }
  const response = await fetch(`/relatorio/${cpf}`);
  const dados = await response.json();
  if(!dados.dias || dados.dias.length === 0){
    document.getElementById("mensagem").textContent = "Nenhum registro encontrado.";
    document.getElementById("mensagem").style.color = "red";
    return;
  }
  
  // Buscar dados da colaboradora para o cabeçalho
  const respColab = await fetch('/assets/colaboradoras.json');
  const dataColab = await respColab.json();
  const infoColab = dataColab.colaboradoras.find(c => c.cpf === cpf) || {};
  
  gerarFolhaDePonto(dados, infoColab);
}

async function gerarPDFGeral(){
  const response = await fetch(`/relatorio-geral`);
  const dados = await response.json();
  if(!dados.registros_ponto || dados.registros_ponto.length === 0){
    document.getElementById("mensagem").textContent = "Nenhum registro encontrado.";
    document.getElementById("mensagem").style.color = "red";
    return;
  }

  const respColab = await fetch('/assets/colaboradoras.json');
  const dataColab = await respColab.json();

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');

  for(let i=0; i < dados.registros_ponto.length; i++){
    const colab = dados.registros_ponto[i];
    const infoColab = dataColab.colaboradoras.find(c => c.cpf === colab.cpf) || {};
    if(i > 0) doc.addPage();
    renderizarPagina(doc, colab, infoColab);
  }

  doc.save("Folha_de_Ponto_Geral.pdf");
}

function renderizarPagina(doc, colab, infoColab) {
  const agora = new Date();
  const periodo = (agora.getMonth() + 1).toString().padStart(2, '0') + "/" + agora.getFullYear();

  // Cabeçalho Principal
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.text("FOLHA INDIVIDUAL DE PONTO", 10, 10);
  doc.text(`Período: ${periodo}`, 160, 10);

  // Tabela de Informações da Empresa e Funcionário
  doc.autoTable({
    startY: 12,
    theme: 'plain',
    styles: { fontSize: 8, cellPadding: 1, lineColor: [0, 0, 0], lineWidth: 0.1 },
    body: [
      [
        { content: `Empresa: 17 - LUZZA SERVICOS E COMERCIO LTDA\nEndereço: ACSV SO 41 AVENIDA LO 09 LOTE 16, 0\nCidade: PALMAS`, styles: { halign: 'left' } },
        { content: `CNPJ: 58.114.617/0001-18\nBairro: PLANO DIRETOR SUL\nUF: TO CEP: 77015-594`, styles: { halign: 'left' } }
      ],
      [
        { content: `Nome: ${colab.nome.toUpperCase()}\nFunção:`, styles: { halign: 'left' } },
        { content: `Horário: ${infoColab.horario_inicio || '08:00'} - ${infoColab.horario_descanso || ''} - ${infoColab.horario_saida || '18:00'}\nDepartamento: GERAL`, styles: { halign: 'left' } }
      ]
    ],
    columnStyles: { 0: { cellWidth: 100 }, 1: { cellWidth: 90 } }
  });

  // Tabela de Pontos
  const diasNoMes = new Date(agora.getFullYear(), agora.getMonth() + 1, 0).getDate();
  const rows = [];
  const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

  for (let d = 1; d <= diasNoMes; d++) {
    const dataStr = `${agora.getFullYear()}-${(agora.getMonth() + 1).toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
    const dataObj = new Date(agora.getFullYear(), agora.getMonth(), d);
    const diaSemana = diasSemana[dataObj.getDay()];
    
    // Buscar registros do dia
    // Nota: No banco atual os registros estão em colab.dias como array de {data, tipo, hora}
    const registrosDia = colab.dias.filter(reg => reg.data === dataStr);
    
    const ponto = {
      entrada: registrosDia.find(r => r.tipo === 'entrada')?.hora || '',
      saida_alm: registrosDia.find(r => r.tipo === 'saida_almoco')?.hora || '',
      volta_alm: registrosDia.find(r => r.tipo === 'volta_almoco')?.hora || '',
      saida: registrosDia.find(r => r.tipo === 'saida')?.hora || ''
    };

    rows.push([
      d.toString().padStart(2, '0'),
      diaSemana,
      ponto.entrada,
      ponto.saida_alm,
      ponto.volta_alm,
      ponto.saida,
      '', '', '', '' // Extra e Assinatura
    ]);
  }

  doc.autoTable({
    startY: doc.lastAutoTable.finalY + 2,
    head: [
      [{content: 'Dia', rowSpan: 2}, {content: 'Entrada', rowSpan: 2}, {content: 'Intervalo', colSpan: 2}, {content: 'Saída', rowSpan: 2}, {content: 'Hora Extra', colSpan: 3}, {content: 'Assinatura', rowSpan: 2}],
      ['Saída', 'Entrada', 'Entrada', 'Saída', 'Nº Horas']
    ],
    body: rows,
    theme: 'grid',
    styles: { fontSize: 7, cellPadding: 1, halign: 'center', lineColor: [0, 0, 0], lineWidth: 0.1 },
    headStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold' },
    columnStyles: {
      0: { cellWidth: 8 },
      1: { cellWidth: 10 },
      9: { cellWidth: 40 }
    }
  });

  // Rodapé
  const finalY = doc.lastAutoTable.finalY + 5;
  doc.setFontSize(7);
  doc.text("Obs.: Substitui o Quadro de Horário de Trabalho, de acordo com o disposto na Portaria Ministerial nº 3162 de 08/09/1982", 10, finalY);
  doc.text("Reconheço a exatidão destas anotações. Data: ________/________/________", 50, finalY + 5);

  doc.line(20, finalY + 20, 90, finalY + 20);
  doc.text("Visto chefia", 45, finalY + 24);

  doc.line(120, finalY + 20, 190, finalY + 20);
  doc.text("Visto funcionário", 145, finalY + 24);
}

function gerarFolhaDePonto(colab, infoColab) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  renderizarPagina(doc, colab, infoColab);
  doc.save(`Folha_Ponto_${colab.nome.replace(/\s+/g, '_')}.pdf`);
  document.getElementById("mensagem").textContent = "PDF gerado com sucesso!";
  document.getElementById("mensagem").style.color = "green";
}

function voltar(){ window.location.href = "admin.html"; }
</script>
</body>
</html>
