<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Registrar Ponto</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root{
  --wine:#680307;
  --wine-dark:#3f0105;
  --sand:#e8d9c3;
  --paper:#fffaf4;
  --ink:#2d2725;
  --muted:#7b6d66;
  --shadow:0 28px 60px rgba(39,11,13,0.22);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:'Manrope', sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 14%, rgba(232,217,195,0.18), transparent 22%),
    radial-gradient(circle at 88% 10%, rgba(184,95,42,0.18), transparent 20%),
    linear-gradient(135deg, var(--wine-dark) 0%, var(--wine) 46%, #9a5d35 100%);
}

.page-shell{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:28px;
}

.card{
  width:min(620px, 100%);
  padding:30px;
  border-radius:30px;
  background:rgba(255,250,244,0.95);
  border:1px solid rgba(255,255,255,0.72);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}

.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:9px 14px;
  border-radius:999px;
  background:rgba(104,3,7,0.08);
  color:var(--wine);
  font-size:12px;
  font-weight:800;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

h2{
  margin:18px 0 10px;
  font-size:34px;
}

.lead{
  margin:0 0 24px;
  color:var(--muted);
  line-height:1.65;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:16px;
}

.field{
  display:grid;
  gap:8px;
}

.field.full{
  grid-column:1 / -1;
}

.field label{
  font-size:13px;
  font-weight:700;
  color:var(--muted);
}

.field input{
  width:100%;
  padding:15px 16px;
  border-radius:18px;
  border:1px solid rgba(104,3,7,0.14);
  background:#fff;
  font:inherit;
  color:var(--ink);
  outline:none;
}

.field input:focus{
  border-color:rgba(104,3,7,0.42);
  box-shadow:0 0 0 4px rgba(104,3,7,0.08);
}

.button{
  width:100%;
  margin-top:22px;
  border:none;
  border-radius:18px;
  padding:16px 18px;
  background:linear-gradient(135deg, var(--wine), #8a1f24);
  color:var(--sand);
  font:inherit;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 18px 34px rgba(104,3,7,0.24);
  transition:transform 0.2s ease, box-shadow 0.2s ease;
}

.button:hover{
  transform:translateY(-2px);
  box-shadow:0 22px 38px rgba(104,3,7,0.28);
}

@media (max-width: 640px){
  .page-shell{
    padding:18px;
  }

  .card{
    padding:22px;
    border-radius:24px;
  }

  h2{
    font-size:30px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="page-shell">
  <div class="card">
    <span class="eyebrow">
      <i class="material-icons" style="font-size:16px;">schedule</i>
      Registro simples
    </span>

    <h2>Registrar ponto</h2>
    <p class="lead">Tela auxiliar para registrar jornada manualmente no navegador local.</p>

    <div class="form-grid">
      <div class="field full">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="Digite o CPF da colaboradora">
      </div>

      <div class="field">
        <label for="entrada">Horario de entrada</label>
        <input type="time" id="entrada">
      </div>

      <div class="field">
        <label for="saida">Horario de saida</label>
        <input type="time" id="saida">
      </div>

      <div class="field full">
        <label for="descanso">Descanso</label>
        <input type="text" id="descanso" placeholder="Ex: 12:00-13:00">
      </div>
    </div>

    <button class="button" onclick="registrar()">Registrar</button>
  </div>
</div>

<script>
function registrar() {
  const cpfInput = document.getElementById("cpf");
  const entradaInput = document.getElementById("entrada");
  const saidaInput = document.getElementById("saida");
  const descansoInput = document.getElementById("descanso");
  const registros = JSON.parse(localStorage.getItem("registro_colaborador")) || [];

  const novoRegistro = {
    cpf: cpfInput.value,
    data: new Date().toISOString().split("T")[0],
    horario_inicio_ponto: entradaInput.value,
    horario_fim_ponto: saidaInput.value,
    horario_descanso_ponto: descansoInput.value,
  };

  registros.push(novoRegistro);
  localStorage.setItem("registro_colaborador", JSON.stringify(registros));

  alert("Ponto registrado!");
}
</script>

</body>
</html>
