<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel da Colaboradora</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<script src="node_modules/face-api.js/dist/face-api.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Roboto', sans-serif;
  background:linear-gradient(135deg,#680307,#680307);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#e8d9c3;
  width:400px;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  max-height:95vh;
  overflow-y:auto;
}

h2{
  margin-top:0;
  font-weight:500;
  color:#333;
}

.info{
  margin-bottom:20px;
  font-size:14px;
  color:#555;
}

.relogio{
  font-size:22px;
  font-weight:500;
  color:#680307;
  margin-bottom:20px;
}

label{
  font-size:13px;
  color:#666;
}

select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

.camera-box{
  margin-top:20px;
  text-align:center;
}

#video{
  width:100%;
  border-radius:8px;
  background:#000;
  transform:scaleX(-1);
}

#canvas{
  display:none;
}

button{
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#680307;
  color:#e8d9c3;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#890408;
}

button:disabled{
  background:#ccc;
  cursor:not-allowed;
}

.success{
  margin-top:15px;
  font-size:13px;
  color:green;
}

.error{
  margin-top:15px;
  font-size:13px;
  color:red;
}

.top-bar{
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.logout{
  background:#e53935;
  border:none;
  color:#e8d9c3;
  padding:6px 12px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

.logout:hover{
  background:#c62828;
}
</style>
</head>
<body>

<div class="card">

<h2>Painel da Colaboradora</h2>
<div class="top-bar">
  <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="info" id="dados"></div>

<div class="relogio" id="agora"></div>

<label>Tipo de Registro</label>
<select id="tipoPonto">
  <option value="entrada">Entrada</option>
  <option value="saida_almoco">Saida Almoco</option>
  <option value="volta_almoco">Volta Almoco</option>
  <option value="saida">Saida Final</option>
</select>

<div class="camera-box">
  <label style="display:block; margin-bottom:10px;">Reconhecimento facial obrigatorio</label>
  <video id="video" autoplay muted></video>
  <canvas id="canvas"></canvas>
</div>

<button id="btnRegistrar" onclick="validarERegistrar()">Validar Face e Registrar Ponto</button>

<div id="mensagem"></div>

</div>

<script>
let colaboradora = JSON.parse(localStorage.getItem("colaboradoraLogada") || "null");

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const btnRegistrar = document.getElementById("btnRegistrar");
const msgDiv = document.getElementById("mensagem");
const dadosDiv = document.getElementById("dados");
const relogioDiv = document.getElementById("agora");

if (!colaboradora || !colaboradora.cpf) {
  window.location.href = "index.html";
}

function normalizeCpf(value) {
  return String(value || "").replace(/\D/g, "");
}

function formatCpf(value) {
  const cpf = normalizeCpf(value);
  if (cpf.length !== 11) {
    return cpf;
  }

  return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
}

function getLocalDateIso(date = new Date()) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function setMensagem(texto, tipo = "") {
  msgDiv.className = tipo;
  msgDiv.textContent = texto;
}

function renderDados() {
  dadosDiv.innerHTML = `
    <strong>${colaboradora.nome}</strong><br>
    CPF: ${formatCpf(colaboradora.cpf)}<br>
    Horario: ${colaboradora.horario_inicio} - ${colaboradora.horario_saida}
  `;
}

function atualizarRelogio() {
  const agora = new Date();
  relogioDiv.textContent = `${agora.toLocaleDateString("pt-BR")} ${agora.toLocaleTimeString("pt-BR")}`;
}

function stopCamera() {
  if (!video.srcObject) {
    return;
  }

  for (const track of video.srcObject.getTracks()) {
    track.stop();
  }

  video.srcObject = null;
}

async function carregarColaboradoraAtual() {
  const response = await fetch(`/api/colaboradoras/${encodeURIComponent(normalizeCpf(colaboradora.cpf))}`);

  if (!response.ok) {
    throw new Error("Colaboradora nao encontrada");
  }

  colaboradora = await response.json();
  localStorage.setItem("colaboradoraLogada", JSON.stringify(colaboradora));
  renderDados();
}

async function initFaceApiAndCamera() {
  setMensagem("Carregando modulos de seguranca...");
  btnRegistrar.disabled = true;

  await faceapi.nets.tinyFaceDetector.loadFromUri("/models");
  await faceapi.nets.faceLandmark68Net.loadFromUri("/models");
  await faceapi.nets.faceRecognitionNet.loadFromUri("/models");

  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  setMensagem("Camera pronta. Posicione seu rosto.");
  btnRegistrar.disabled = false;
}

async function bootstrap() {
  try {
    await carregarColaboradoraAtual();
    atualizarRelogio();
    setInterval(atualizarRelogio, 1000);
    await initFaceApiAndCamera();
  } catch (error) {
    console.error(error);
    setMensagem("Erro ao carregar dados ou acessar a camera.", "error");
    btnRegistrar.disabled = true;
  }
}

bootstrap();

async function validarERegistrar() {
  setMensagem("Validando identidade...");
  btnRegistrar.disabled = true;

  if (!colaboradora.face_descriptor) {
    setMensagem("Erro: colaboradora sem biometria cadastrada. Contate o admin.", "error");
    btnRegistrar.disabled = false;
    return;
  }

  if (!video.videoWidth || !video.videoHeight) {
    setMensagem("A camera ainda nao esta pronta. Tente novamente.", "error");
    btnRegistrar.disabled = false;
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const detection = await faceapi
    .detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks()
    .withFaceDescriptor();

  if (!detection) {
    setMensagem("Rosto nao detectado. Tente novamente.", "error");
    btnRegistrar.disabled = false;
    return;
  }

  const savedDescriptor = new Float32Array(colaboradora.face_descriptor);
  const currentDescriptor = detection.descriptor;
  const distance = faceapi.euclideanDistance(savedDescriptor, currentDescriptor);

  if (distance < 0.5) {
    setMensagem("Identidade confirmada! Registrando...", "success");
    await registrarPonto();
    return;
  }

  setMensagem("Reconhecimento falhou. Acesso negado.", "error");
  btnRegistrar.disabled = false;
}

async function registrarPonto() {
  const tipo = document.getElementById("tipoPonto").value;
  const agora = new Date();
  const horarioAtual = agora.toTimeString().slice(0, 5);
  const dataAtual = getLocalDateIso(agora);

  const registro = {
    cpf: normalizeCpf(colaboradora.cpf),
    tipo,
    data: dataAtual,
    hora: horarioAtual,
  };

  try {
    const response = await fetch("/api/registrar-ponto", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(registro),
    });

    const resultado = await response.json();

    if (!response.ok) {
      setMensagem(resultado.mensagem || "Erro ao salvar registro no servidor.", "error");
      btnRegistrar.disabled = false;
      return;
    }

    setMensagem(resultado.mensagem, "success");
    btnRegistrar.disabled = true;
  } catch (error) {
    console.error("Erro ao registrar ponto:", error);
    setMensagem("Erro ao salvar registro no servidor.", "error");
    btnRegistrar.disabled = false;
  }
}

function logout() {
  stopCamera();
  localStorage.removeItem("colaboradoraLogada");
  window.location.href = "index.html";
}
</script>

</body>
</html>
