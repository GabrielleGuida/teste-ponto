<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel da Colaboradora</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<script src="node_modules/face-api.js/dist/face-api.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Roboto', sans-serif;
  background:linear-gradient(135deg,#680307,#680307);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#e8d9c3;
  width:400px;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  max-height: 95vh;
  overflow-y: auto;
}

h2{
  margin-top:0;
  font-weight:500;
  color:#333;
}

.info{
  margin-bottom:20px;
  font-size:14px;
  color:#555;
}

.relogio{
  font-size:22px;
  font-weight:500;
  color:#680307;
  margin-bottom:20px;
}

label{
  font-size:13px;
  color:#666;
}

select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

.camera-box {
  margin-top: 20px;
  text-align: center;
}

#video {
  width: 100%;
  border-radius: 8px;
  background: #000;
  transform: scaleX(-1);
}

#canvas {
  display: none;
}

button{
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#680307;
  color:#e8d9c3;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#125ca1;
}

button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.success{
  margin-top:15px;
  font-size:13px;
  color:green;
}

.error {
  margin-top:15px;
  font-size:13px;
  color:red;
}

.top-bar{
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.logout{
  background:#e53935;
  border:none;
  color:#e8d9c3;
  padding:6px 12px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

.logout:hover{
  background:#c62828;
}

</style>
</head>
<body>

<div class="card">

<h2>Painel da Colaboradora</h2>
<div class="top-bar">
  <button class="logout" onclick="logout()">Sair</button>
</div>


<div class="info" id="dados"></div>

<div class="relogio" id="agora"></div>

<label>Tipo de Registro</label>
<select id="tipoPonto">
  <option value="entrada">Entrada</option>
  <option value="saida_almoco">Saída Almoço</option>
  <option value="volta_almoco">Volta Almoço</option>
  <option value="saida">Saída Final</option>
</select>

<div class="camera-box">
  <label style="display:block; margin-bottom:10px;">Reconhecimento Facial Obrigatório</label>
  <video id="video" autoplay muted></video>
  <canvas id="canvas"></canvas>
</div>

<button id="btnRegistrar" onclick="validarERegistrar()">Validar Face e Registrar Ponto</button>

<div id="mensagem"></div>

</div>

<script>
const colaboradora = JSON.parse(localStorage.getItem("colaboradoraLogada"));
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const btnRegistrar = document.getElementById('btnRegistrar');
const msgDiv = document.getElementById('mensagem');

if(!colaboradora){
  window.location.href = "index.html";
}

document.getElementById("dados").innerHTML = `
  <strong>${colaboradora.nome}</strong><br>
  CPF: ${colaboradora.cpf}<br>
  Horário: ${colaboradora.horario_inicio} - ${colaboradora.horario_saida}
`;

// Relógio ao vivo
setInterval(() => {
  const agora = new Date();
  document.getElementById("agora").textContent =
    agora.toLocaleDateString() + " " + agora.toLocaleTimeString();
}, 1000);

async function init() {
  try {
    msgDiv.className = "";
    msgDiv.textContent = "Carregando módulos de segurança...";
    btnRegistrar.disabled = true;

    await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
    await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
    await faceapi.nets.faceRecognitionNet.loadFromUri('/models');

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    
    msgDiv.textContent = "Câmera pronta. Posicione seu rosto.";
    btnRegistrar.disabled = false;
  } catch (err) {
    msgDiv.className = "error";
    msgDiv.textContent = "Erro ao acessar câmera ou carregar modelos.";
    console.error(err);
  }
}

init();

async function validarERegistrar() {
  msgDiv.className = "";
  msgDiv.textContent = "Validando identidade...";
  btnRegistrar.disabled = true;

  if (!colaboradora.face_descriptor) {
    msgDiv.className = "error";
    msgDiv.textContent = "Erro: Colaboradora sem biometria cadastrada. Contate o admin.";
    btnRegistrar.disabled = false;
    return;
  }

  // Capturar frame atual
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const detection = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

  if (!detection) {
    msgDiv.className = "error";
    msgDiv.textContent = "Rosto não detectado. Tente novamente.";
    btnRegistrar.disabled = false;
    return;
  }

  // Comparar descritores
  const savedDescriptor = new Float32Array(colaboradora.face_descriptor);
  const currentDescriptor = detection.descriptor;
  const distance = faceapi.euclideanDistance(savedDescriptor, currentDescriptor);

  // Limiar de 0.6 é padrão para reconhecimento facial
  if (distance < 0.5) {
    msgDiv.className = "success";
    msgDiv.textContent = "Identidade confirmada! Registrando...";
    await registrarPonto();
  } else {
    msgDiv.className = "error";
    msgDiv.textContent = "Reconhecimento falhou. Acesso negado.";
    btnRegistrar.disabled = false;
  }
}

async function registrarPonto(){
  const tipo = document.getElementById("tipoPonto").value;
  const agora = new Date();
  const horarioAtual = agora.toTimeString().slice(0,5);
  const dataAtual = agora.toISOString().split("T")[0];

  const registro = {
    cpf: colaboradora.cpf,
    nome: colaboradora.nome,
    dia: {
      data: dataAtual,
      tipo: tipo,
      hora: horarioAtual
    }
  };

  try {
    const response = await fetch("/registrar-ponto", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(registro)
    });

    const resultado = await response.json();
    msgDiv.className = "success";
    msgDiv.textContent = resultado.mensagem;
    
    // Opcional: Bloquear botão após sucesso
    btnRegistrar.disabled = true;
  } catch (err) {
    msgDiv.className = "error";
    msgDiv.textContent = "Erro ao salvar registro no servidor.";
    btnRegistrar.disabled = false;
  }
}

function logout(){
  localStorage.removeItem("colaboradoraLogada");
  window.location.href = "index.html";
}

</script>

</body>
</html>
